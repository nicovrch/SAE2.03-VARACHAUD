<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 2rem;
            background-color: #1a1a1a;
            color: #fff;
        }

        .landing__card {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 2rem;
            background-color: #2a2a2a;
            color: inherit;
            text-decoration: none;
            border-radius: 0.5rem;
        }
        @media (min-width: 64rem) {
            .landing__list {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>

<body>
    <li>
        <a class="landing__card" href="./app/index.html">
            <h2 class="landing__card-title">Application</h2>
        </a>
    </li>
    <li>
        <a class="landing__card" href="./admin/index.html">
            <h2 class="landing__card-title">Administration</h2>
        </a>
    </li>
</body>

</html>
