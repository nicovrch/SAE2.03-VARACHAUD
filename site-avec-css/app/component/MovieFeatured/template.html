<article class="featured__item">
  <a class="featured__link" href="detail_movie.html?id={{id}}">
    <img class="featured__image" src="../../server/images/{{image}}" alt="Affiche du film {{name}}" loading="lazy" />
    <div class="featured__info">
      <h3 class="featured__title">{{name}}</h3>
      <p class="featured__description">{{description}}</p>
    </div>
  </a>
</article>
