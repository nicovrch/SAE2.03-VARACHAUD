<article class="movieDetail">
  <img class="movieDetail__image" src="../../server/images/{{image}}" alt="Affiche du film {{name}}" />
  <h2 class="movieDetail__title">{{name}}</h2>
  <p class="movieDetail__meta">{{year}} · {{length}} min · {{category}} · {{min_age}}+</p>
  <p class="movieDetail__director">Réalisé par {{director}}</p>
  <p class="movieDetail__description">{{description}}</p>
  <iframe class="movieDetail__trailer" src="{{trailer}}" allowfullscreen></iframe>
</article>
