<section class="stats">
  <h1 class="stats__title">Statistiques</h1>
  <div class="stats__grid">
    <div class="stats__card">
      <p class="stats__value">{{totalProfiles}}</p>
      <p class="stats__label">Profils créés</p>
    </div>
    <div class="stats__card">
      <p class="stats__value">{{totalMovies}}</p>
      <p class="stats__label">Films au catalogue</p>
    </div>
    <div class="stats__card">
      <p class="stats__value">{{avgMoviesPerProfile}}</p>
      <p class="stats__label">Films moyens par profil (favoris)</p>
    </div>
    <div class="stats__card">
      <p class="stats__value">{{mostFavoriteMovie}}</p>
      <p class="stats__label">Film le plus ajouté en favori</p>
    </div>
    <div class="stats__card">
      <p class="stats__value">{{mostPopularCategory}}</p>
      <p class="stats__label">Catégorie la plus populaire</p>
    </div>
  </div>
</section>
